<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Ride Buddy Pro</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ride Buddy">
    
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">Ride Buddy</div>
            <p class="sub-text">Din AI-ledsager på asfalten</p>
        </header>

        <main>
            <div class="card" id="ai-briefing">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 style="margin: 0;">Storebror AI</h3>
                    <span class="val" style="color: var(--primary); font-size: 0.8rem; font-weight: 700;">LIVE</span>
                </div>
                <p id="ai-response" class="sub-text" style="min-height: 50px;">
                    Tryk på knappen for at få dagens køre-briefing...
                </p>
                <button class="primary-btn" onclick="getAIRecommendation()" style="margin-top: 15px;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                    Hent Briefing
                </button>
            </div>

            <div class="card">
                <div class="settings-item">
                    <span>Maskine</span>
                    <span id="display-vehicle" style="font-weight: 600;">Henter...</span>
                </div>
                <div class="settings-item">
                    <span>Radar Status</span>
                    <span style="color: var(--success); font-weight: 700;">AKTIV</span>
                </div>
            </div>

            <div class="card" onclick="window.location.href='radar.html'" style="cursor: pointer; background: linear-gradient(135deg, var(--card-bg), rgba(0,122,255,0.05));">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <div style="background: var(--primary); padding: 10px; border-radius: 12px; color: white;">
                        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
                    </div>
                    <div>
                        <span style="display: block; font-weight: 700;">Åbn Live Radar</span>
                        <span class="sub-text">Se kameraer i nærheden</span>
                    </div>
                </div>
            </div>
        </main>

        <nav class="dynamic-island">
            <a href="index.html" class="nav-link active">
                <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </a>
            <a href="outfit.html" class="nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 4.5c-1.5 0-2.5 1-2.5 1S8 4 6 4C4 4 2 5 2 7v3c0 1.1.9 2 2 2h1.5v8c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2v-8H20c1.1 0 2-.9 2-2V7c0-2-2-3-4-3-2 0-3.5 1.5-3.5 1.5S13.5 4.5 12 4.5z"/>
                </svg>
            </a>
            <a href="radar.html" class="nav-link">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg>
            </a>
            <a href="chat.html" class="nav-link">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
            </a>
            <a href="settings.html" class="nav-link">
                <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.487.487 0 00-.59.22L3.06 7.91a.48.48 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.48.48 0 00-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/></svg>
            </a>
        </nav>
    </div>

    <script src="script.js"></script>
</body>
</html>
