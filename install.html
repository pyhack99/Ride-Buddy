<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Ride Boddy Installer</title>
    <link rel="stylesheet" href="install.css"> </head>
<body>
    <div class="install-container">
        <div class="app-icon-large">
            <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 4.5c-1.5 0-2.5 1-2.5 1S8 4 6 4C4 4 2 5 2 7v3c0 1.1.9 2 2 2h1.5v8c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2v-8H20c1.1 0 2-.9 2-2V7c0-2-2-3-4-3-2 0-3.5 1.5-3.5 1.5S13.5 4.5 12 4.5z"/>
            </svg>
        </div>

        <h2>Ride Buddy Pro</h2>
        <p class="sub-text">Denne app kræver installation for at få adgang til Radar og AI-briefing.</p>

        <div class="instruction-card">
            <div class="step">
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8M16 6l-4-4-4 4M12 2v13"/></svg>
                </div>
                <div class="step-text">Tryk på del-ikonet i browseren</div>
            </div>
            <div class="step">
                <div class="icon-box">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                </div>
                <div class="step-text">Vælg "Føj til hjemmeskærm"</div>
            </div>
            <div class="arrow-down"></div>
        </div>
    </div>
</body>
</html>
