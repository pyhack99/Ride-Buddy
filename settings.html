<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Indstillinger - Ride Buddy</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Ride Buddy">
    <link rel="apple-touch-icon" href="icon.png">
    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="logo">Indstillinger</div>
            <p class="sub-text">Administrer din profil og systemer</p>
        </header>

        <main>
            <div class="card">
                <h4 style="margin-top: 0; margin-bottom: 20px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted);">App Udseende</h4>
                
                <div class="settings-item">
                    <div style="display: flex; align-items: center; gap: 10px;">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
                        <span>Mørkt Tema</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="theme-toggle" onchange="toggleTheme()">
                        <span class="slider"></span>
                    </label>
                </div>
            </div>

            <div class="card">
                <h4 style="margin-top: 0; margin-bottom: 20px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted);">Min Profil</h4>
                
                <div class="settings-item" onclick="editVehicle()" style="cursor: pointer;">
                    <div style="display: flex; flex-direction: column;">
                        <span style="font-weight: 500;">Køretøj</span>
                        <span id="display-vehicle" class="sub-text">Henter...</span>
                    </div>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--text-muted)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>

                <div class="settings-item">
                    <div style="display: flex; flex-direction: column; width: 100%;">
                        <span style="margin-bottom: 8px; font-weight: 500;">Region / Land</span>
                        <select id="country-select" onchange="updateCountry(this)">
                            <option value="Danmark">Danmark</option>
                            <option value="Sverige">Sverige</option>
                            <option value="Norge">Norge</option>
                            <option value="Tyskland">Tyskland</option>
                            <option value="USA">USA</option>
                            <option value="Storbritannien">Storbritannien</option>
                            <option value="Frankrig">Frankrig</option>
                            <option value="Italien">Italien</option>
                            <option value="Spanien">Spanien</option>
                            <option value="Holland">Holland</option>
                            <option value="Østrig">Østrig</option>
                            <option value="Schweiz">Schweiz</option>
                            <option value="Australien">Australien</option>
                            <option value="Canada">Canada</option>
                            <option value="Japan">Japan</option>
                        </select>
                    </div>
                </div>
            </div>

            <div class="card">
                <h4 style="margin-top: 0; margin-bottom: 20px; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; color: var(--text-muted);">Sikkerhed</h4>
                <button class="primary-btn" onclick="resetApp()" style="background: rgba(255, 59, 48, 0.1); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.2);">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                    Nulstil alle data
                </button>
            </div>

            <div style="text-align: center; margin-top: 20px; padding-bottom: 40px;">
                <p class="sub-text" style="font-size: 0.7rem; opacity: 0.5;">
                    Ride Buddy v2.2.0 Build 2026<br>
                    Udviklet til Pro-bikere
                </p>
            </div>
        </main>

        <nav class="dynamic-island">
            <a href="index.html" class="nav-link"><svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg></a>
            <a href="outfit.html" class="nav-link">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 4.5c-1.5 0-2.5 1-2.5 1S8 4 6 4C4 4 2 5 2 7v3c0 1.1.9 2 2 2h1.5v8c0 1.1.9 2 2 2h9c1.1 0 2-.9 2-2v-8H20c1.1 0 2-.9 2-2V7c0-2-2-3-4-3-2 0-3.5 1.5-3.5 1.5S13.5 4.5 12 4.5z"/>
                </svg>
            </a>
            <a href="radar.html" class="nav-link"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/></svg></a>
            <a href="chat.html" class="nav-link"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></a>
            <a href="settings.html" class="nav-link active">
                <svg viewBox="0 0 24 24">
                    <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.488.488 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.487.487 0 00-.59.22L3.06 7.91a.48.48 0 00.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32a.48.48 0 00-.12-.61l-2.03-1.58zM12 15.5c-1.93 0-3.5-1.57-3.5-3.5s1.57-3.5 3.5-3.5 3.5 1.57 3.5 3.5-1.57 3.5-3.5 3.5z"/>
                </svg>
            </a>
        </nav>
    </div>

    <script src="script.js"></script>
    <script>
        function updateCountry(select) {
            localStorage.setItem('rb_country', select.value);
            console.log("Land opdateret til: " + select.value);
        }

        function resetApp() {
            if (confirm("Vil du slette alle data og starte forfra? Dette kan ikke fortrydes.")) {
                localStorage.clear();
                window.location.href = 'onboarding.html';
            }
        }
    </script>
</body>
</html>
